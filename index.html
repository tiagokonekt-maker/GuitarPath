<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />

    <!-- PWA core -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#E85D1A" id="theme-color-meta" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Groply" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Icônes navigateur -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />

    <!-- SEO -->
    <meta name="description" content="Progresser à la guitare — impro, théorie, manche" />
    <meta property="og:title" content="Groply" />
    <meta property="og:description" content="Progresser à la guitare — impro, théorie, manche" />
    <meta property="og:image" content="/icon-512.png" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>Groply</title>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(reg => {
            reg.addEventListener('updatefound', () => {
              const sw = reg.installing;
              if (!sw) return;
              sw.addEventListener('statechange', () => {
                if (sw.state === 'installed' && navigator.serviceWorker.controller) {
                  sw.postMessage('SKIP_WAITING');
                  navigator.serviceWorker.addEventListener('controllerchange',
                    () => window.location.reload(), { once: true });
                }
              });
            });
          }).catch(() => {});
        });
      }
      // Shortcuts
      const sc = new URLSearchParams(location.search).get('shortcut');
      if (sc) window.__GROPLY_SHORTCUT = sc;
    </script>
  </body>
</html>
